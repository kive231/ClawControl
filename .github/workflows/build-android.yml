name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npx vite build --config vite.config.mobile.ts

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Init Capacitor Android (if needed)
        run: |
          if [ ! -f android/build.gradle ]; then
            echo "Android build files missing, running cap add android..."
            npx cap add android
          fi

      - name: Init Capacitor Android (preserve custom source)
        run: |
          # Backup custom Android source files before regenerating
          mkdir -p /tmp/android-backup
          if [ -d android/app/src/main/java ]; then
            cp -r android/app/src/main/java /tmp/android-backup/
          fi
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp android/app/src/main/AndroidManifest.xml /tmp/android-backup/
          fi
          # Remove and regenerate full Android project
          rm -rf android/
          npx cap add android
          # Restore custom source
          if [ -d /tmp/android-backup/java ]; then
            cp -r /tmp/android-backup/java/* android/app/src/main/java/
          fi
          if [ -f /tmp/android-backup/AndroidManifest.xml ]; then
            cp /tmp/android-backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Generate assets
        run: npx @capacitor/assets generate --android --splashBackgroundColor "#06080a" --iconBackgroundColor "#06080a"

      - name: Fix Android edge-to-edge
        run: node scripts/fix-android-edge-to-edge.js

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (Debug)
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClawControl-Android-Debug
          path: android/app/build/outputs/apk/debug/*.apk
