name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npx vite build --config vite.config.mobile.ts

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Init & Sync Capacitor Android
        run: |
          # Backup custom Android source
          mkdir -p /tmp/android-backup/app/src/main
          if [ -d android/app/src/main/java ]; then
            cp -r android/app/src/main/java /tmp/android-backup/app/src/main/
          fi
          if [ -d android/app/src/main/res ]; then
            cp -r android/app/src/main/res /tmp/android-backup/app/src/main/
          fi
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp android/app/src/main/AndroidManifest.xml /tmp/android-backup/app/src/main/
          fi
          # Remove stale android dir and generate fresh project
          rm -rf android/
          npx cap add android
          # Restore custom source
          if [ -d /tmp/android-backup/app/src/main/java ]; then
            cp -r /tmp/android-backup/app/src/main/java/* android/app/src/main/java/
          fi
          if [ -f /tmp/android-backup/app/src/main/AndroidManifest.xml ]; then
            cp /tmp/android-backup/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi
          # Create missing xml resources referenced by custom AndroidManifest
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true">
        <trust-anchors>
            <certificates src="system" />
        </trust-anchors>
    </base-config>
</network-security-config>
XMLEOF
          cat > android/app/src/main/res/xml/file_paths.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<paths>
    <cache-path name="cache" path="." />
    <files-path name="files" path="." />
</paths>
XMLEOF
          # Patch root build.gradle to add Kotlin plugin
          # (plugin capacitor-native-websocket uses kotlin-android)
          KOTLIN_VERSION="2.0.21"
          sed -i "/classpath/ a\        classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:${KOTLIN_VERSION}\"" android/build.gradle
          # Ensure compileSdkVersion is set in gradle.properties
          if ! grep -q "compileSdkVersion" android/gradle.properties 2>/dev/null; then
            echo "compileSdkVersion=36" >> android/gradle.properties
          fi
          # Sync
          npx cap sync android

      - name: Generate assets
        run: npx @capacitor/assets generate --android --splashBackgroundColor "#06080a" --iconBackgroundColor "#06080a"

      - name: Fix Android edge-to-edge
        run: node scripts/fix-android-edge-to-edge.js

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (Debug)
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClawControl-Android-Debug
          path: android/app/build/outputs/apk/debug/*.apk
