name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npx vite build --config vite.config.mobile.ts

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Generate assets
        run: npx @capacitor/assets generate --android --splashBackgroundColor "#06080a" --iconBackgroundColor "#06080a"

      - name: Fix Android edge-to-edge
        run: node scripts/fix-android-edge-to-edge.js

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (Debug)
        run: |
          cd android
          if [ ! -f gradlew ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version=8.9
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClawControl-Android-Debug
          path: android/app/build/outputs/apk/debug/*.apk
